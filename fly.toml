# Fly.io configuration
app = "live-sports-feed-scheduler"

# Primary region (choose based on your latency needs)
primary_region = "ams"  # Amsterdam - adjust if needed

# Build configuration
[build]
dockerfile = "Dockerfile"

# VM resource allocation (micro is free tier)
[env]
NODE_ENV = "production"

# Environment secrets (set via: flyctl secrets set GITHUB_TOKEN=xxx etc.)
# FEED_BASE_URL - required
# GITHUB_TOKEN - required (for git push)
# GITHUB_REPO - optional (defaults to live-sports-dashboard)
# GIT_AUTHOR_NAME - optional (defaults to scheduler-bot)
# GIT_AUTHOR_EMAIL - optional (defaults to scheduler@example.com)
# Plus all FEED_* variables for scraper configuration

[processes]
scheduler = "node scheduler.js"

# Health check (optional, ensures the process is running)
[[checks]]
type = "release_cmd"
entrypoint = "node"
cmd = ["--version"]

# Restart policy
kill_timeout = 30
kill_signal = "SIGTERM"
